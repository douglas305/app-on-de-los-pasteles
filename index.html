<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onde los Pasteles - Pedidos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header style="text-align: center; padding: 20px;">
        <h1>Onde los Pasteles</h1>
        <p>¡El sabor que te encanta!</p>
    </header>

    <main id="menu-container"></main>

    <section class="carrito-flotante">
        <div class="resumen-pedido">
            <h2>Tu Pedido</h2>
            
            <div id="lista-carrito"></div>

            <hr>
            <div class="fila-total">
                <span>Total:</span>
                <span id="total-precio">₡0</span>
            </div>

            <div class="acciones">
                <button id="btn-geo" onclick="obtenerUbicacion()">
                    <span id="status-geo">📍 Compartir mi Ubicación</span>
                </button>
                
                <button class="btn-enviar" onclick="enviarPedido()">
                    ✅ Enviar por WhatsApp
                </button>
            </div>
        </div>
    </section>

    <script src="app.js"></script>
</body>
</html>
