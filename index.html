<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onde los Pasteles - Pedidos</title>
    <style>
        :root {
            --fondo-rojo: #cc0000;
            --fondo-tarjeta: #b30000;
            --letras: #ffffff;
        }

        /* --- ANIMACIÓN DINÁMICA DEL TÍTULO --- */
        @keyframes titulo-latido {
            0% { transform: scale(1); text-shadow: 0 0 10px rgba(255,255,255,0.2); }
            50% { transform: scale(1.05); text-shadow: 0 0 20px rgba(255,255,255,0.6); }
            100% { transform: scale(1); text-shadow: 0 0 10px rgba(255,255,255,0.2); }
        }

        /* --- ANIMACIÓN DE LAS SUB-CATEGORÍAS --- */
        @keyframes flotar-categoria {
            0% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            100% { transform: translateX(-5px); }
        }

        body { 
            background-color: var(--fondo-rojo); 
            color: var(--letras); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 20px; 
            margin: 0; 
        }

        h1 { 
            text-align: center; 
            animation: titulo-latido 3s ease-in-out infinite;
            font-size: 2.5em;
        }

        .subtitulo-app { text-align: center; font-style: italic; margin-bottom: 20px; }

        .titulo-categoria {
            color: #ffffff;
            font-size: 1.8em;
            text-transform: uppercase;
            margin-top: 40px;
            padding-bottom: 5px;
            border-bottom: 2px dashed rgba(255, 255, 255, 0.4);
            animation: flotar-categoria 4s ease-in-out infinite;
        }

        .producto-card { 
            background: var(--fondo-tarjeta); 
            border: 1px solid #a00000; 
            padding: 15px; 
            margin: 12px 0; 
            border-radius: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .info-prod h3 { margin: 0; font-size: 1.1em; }
        .info-prod p { margin: 4px 0; font-size: 0.85rem; color: #f8d7da; }

        .btn-add { 
            background: black; 
            color: var(--fondo-rojo); 
            border: none; 
            width: 40px; 
            height: 40px; 
            border-radius: 50%; 
            font-weight: bold; 
            font-size: 24px; 
            cursor: pointer; 
        }

        #carrito-seccion { 
            margin-top: 50px; 
            border-top: 3px solid white; 
            padding-top: 20px; 
            background: rgba(0,0,0,0.15);
            padding: 15px;
            border-radius: 10px;
        }

        .item-pedido { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            background: rgba(255,255,255,0.1); 
            padding: 10px; 
            margin: 8px 0; 
            border-radius: 8px; 
            border-left: 4px solid white;
        }

        .btn-x { background: #ff4d4d; border: none; color: white; cursor: pointer; padding: 6px 12px; border-radius: 5px; font-weight: bold; }
        
        .leyenda-express { font-size: 0.85rem; text-align: center; color: #f8d7da; margin-top: 5px; }
        .btn-gps { width: 100%; padding: 14px;margin: 15px 0 5px 0; background: #444; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-whatsapp { width: 100%; padding: 18px; background: #25d366;none; border-radius: 8px; font-weight: bold; font-size: 1.1em; cursor: pointer; margin-top: 15px; }
 .categoria-titulo, .producto-info p          
        {
    color: #000000 !important;
        }
    </style> 
</head>
<body style="margin: 0; padding: 0; background-color: #f8f9fa;">
    <div style="width: 100%; max-width: 500px; margin: 0 auto; padding: 15px; box-sizing: border-box;">
        <div style="border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.3); border: 4px solid #cc0000; background-color: #cc0000;">
            <video width="100%" style="display: block;" autoplay muted loop playsinline>
                <source src="Vid-20260209.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <h1 style="text-align: center; margin: 10px 0; color: #333;">Onde los Pasteles</h1>
    <p class="subtitulo-app" style="text-align: center; margin-bottom: 20px; color: #666;">¡Sabor auténtico en Orotina Centro!</p>
    
    <div id="menu-container"></div>
    
   <div id="carrito-seccion" style="background-color: #b30000; color: white; padding: 20px; border-radius: 15px; margin-top: 15px;"> 
        <h2>Tu Pedido</h2>
        <div id="lista-carrito"></div>
        <h3 style="text-align: right;">Total: <span id="total-precio">₡0</span></h3>
        
        <button class="btn-gps" onclick="obtenerUbicacion()" id="btn-geo">📍 Compartir mi Ubicación</button>
        <p class="leyenda-express">⚠️ Requerido para entregas a domicilio (Express Gratis en el Centro Orotina)</p>
        <p id="status-geo" style="text-align: center; font-size: 12px;"></p>
        
        <button class="btn-whatsapp" onclick="enviarPedido()">🛒 Enviar Pedido por WhatsApp</button>
    </div>

<script>
const productos = [
    { id: 1, categoria: "Pasteles", nombre: "Pastel de Pizza", precio: 1000, desc: "Sabor tradicional pizza" },
    { id: 2, categoria: "Pasteles", nombre: "Pastel Pollo BBQ", precio: 1000, desc: "Sabor de la casa" },
    { id: 3, categoria: "Pasteles", nombre: "Pastel Nacho", precio: 1000, desc: "Relleno Queso amarillo carne mechada y Frjol molido" },
    { id: 4, categoria: "Pasteles", nombre: "Pastel Arreglado", precio: 1500, desc: "Con ensalada y salsas" },
    { id: 5, categoria: "Pasteles", nombre: "Pastel Papa con Carne", precio: 1000, desc: "Relleno tradicional" },
    { id: 6, categoria: "Empanadas", nombre: "Empanada Papa con Carne", precio: 1000, desc: "Crujiente y calientita" },
    { id: 7, categoria: "Empanadas", nombre: "Empanada Frijol y Chicharrón", precio: 1000, desc: "Combinación perfecta" },
    { id: 8, categoria: "Empanadas", nombre: "Empanada de Pinto", precio: 1000, desc: "Pinto 100% tico" },
    { id: 9, categoria: "Empanadas", nombre: "Empanada de Queso", precio: 1000, desc: "Mucho queso" },
    { id: 10, categoria: "Empanadas", nombre: "Empanada Arreglada", precio: 1500, desc: "Con ensalada y salsas" },
    { id: 11, categoria: "Enyucados", nombre: "Enyucado de Carne", precio: 1300, desc: "Yuca con carne" },
    { id: 12, categoria: "Enyucados", nombre: "Enyucado de Chicharrón", precio: 1300, desc: "Yuca con chicharrón" },
    { id: 13, categoria: "Enyucados", nombre: "Enyucado Arreglado", precio: 1800, desc: "Con ensalada y salsas" },
    { id: 14, categoria: "Pollo Frito", nombre: "Cuarto y Muslo", precio: 1600, desc: "Pollo frito crujiente" },
    { id: 15, categoria: "Bebidas Naturales", nombre: "Mozote", precio: 1200, desc: "Refrescante natural" },
    { id: 16, categoria: "Bebidas Naturales", nombre: "Piña con Arroz", precio: 1200, desc: "Receta de la casa" },
    { id: 17, categoria: "Bebidas Naturales", nombre: "Naranja Zanahoria", precio: 1200, desc: "Vitamínico y fresco" },
    { id: 18, categoria: "Bebidas Naturales", nombre: "Flor de Jamaica", precio: 1200, desc: "Natural y fría" },
    { id: 19, categoria: "Bebidas Naturales", nombre: "Resbaladera Leche", precio: 1500, desc: "Cremosa y dulce" },
    { id: 20, categoria: "Bebidas Naturales", nombre: "Horchata Leche", precio: 1500, desc: "Muy cremosa" },
    { id: 21, categoria: "Bebidas Naturales", nombre: "Cas", precio: 1000, desc: "Ácido y refrescante" },
    { id: 22, categoria: "Bebidas Naturales", nombre: "Frutas", precio: 1000, desc: "Mezcla de frutas" },
    { id: 23, categoria: "Bebidas Naturales", nombre: "Té Frío", precio: 1000, desc: "Con Melocoton" },
    { id: 24, categoria: "Gaseosas y Agua", nombre: "Coca Cola 355ml", precio: 800, desc: "Lata fría" },
    { id: 25, categoria: "Gaseosas y Agua", nombre: "Botella de Agua", precio: 1000, desc: "Hidratación pura" },
    { id: 26, categoria: "Café", nombre: "Café Negro", precio: 800, desc: "Café de exportación" },
    { id: 27, categoria: "Café", nombre: "Café con Leche", precio: 900, desc: "Calientito" },
    { id: 28, categoria: "Promociones (Después de 1pm)", nombre: "2x Empanadas", precio: 1500, desc: "Aplica en seleccionadas" },
    { id: 29, categoria: "Promociones (Después de 1pm)", nombre: "2x Pasteles", precio: 1500, desc: "Aplica en seleccionados" },
];

let carrito = [];
let linkMapa = "";

function mostrarMenu() {
    const contenedor = document.getElementById('menu-container');
    contenedor.innerHTML = "";
    const categorias = [...new Set(productos.map(p => p.categoria))];

    categorias.forEach(categoria => {
        contenedor.innerHTML += `<h2 class="titulo-categoria" style="color: black !important;">${categoria}</h2>`;
        const prods = productos.filter(p => p.categoria === categoria);
        prods.forEach(p => {
            contenedor.innerHTML += `
                <div class="producto-card">
                    <div class="info-prod">
                        <h3>${p.nombre}</h3>
                        <p>${p.desc}</p>
                        <strong>₡${p.precio}</strong>
                    </div>
                    <button class="btn-add" onclick="agregar(${p.id})">+</button>
                </div>`;
        });
    });
}

function agregar(id) {
    const prod = productos.find(p => p.id === id);
    carrito.push({...prod});
    actualizarCarrito();
}

function eliminarProducto(index) {
    carrito.splice(index, 1);
    actualizarCarrito();
}

function actualizarCarrito() {
    const lista = document.getElementById('lista-carrito');
    const totalElemento = document.getElementById('total-precio');
    lista.innerHTML = "";
    let total = 0;

    carrito.forEach((p, index) => {
        total += p.precio;
        lista.innerHTML += `
            <div class="item-pedido">
                <span>✅ ${p.nombre} - ₡${p.precio}</span>
                <button class="btn-x" onclick="eliminarProducto(${index})">✕</button>
            </div>`;
    });
    totalElemento.innerText = `₡${total}`;
}

function obtenerUbicacion() {
    const status = document.getElementById('status-geo');
    if (!navigator.geolocation) {
        status.innerText = "GPS no soportado";
    } else {
        status.innerText = "Localizando...";
        navigator.geolocation.getCurrentPosition((pos) => {
            linkMapa = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
            status.innerText = "✅ Ubicación guardada";
            document.getElementById('btn-geo').style.background = "#238636";
        }, () => {
            status.innerText = "❌ Error de GPS";
        });
    }
}

function enviarPedido() {
    if (carrito.length === 0) return alert("Agrega productos primero");
    let mensaje = "🛍️ *Nuevo Pedido - Onde los Pasteles*\n\n";
    carrito.forEach(p => mensaje += `- ${p.nombre} (₡${p.precio})\n`);
    mensaje += `\n*Total: ${document.getElementById('total-precio').innerText}*`;
    if (linkMapa !== "") mensaje += `\n\n📍 *Ubicación de entrega:* ${linkMapa}`;
    
    // Leyenda de agradecimiento al finalizar
    mensaje += "\n\n🙏 *¡Gracias por preferirnos! Onde los Pasteles*";

    window.open(`https://wa.me/50671571325?text=${encodeURIComponent(mensaje)}`);
}

mostrarMenu();
</script>
</body>
</html>
