<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onde los Pasteles - Orotina</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <h1 class="neon-text">Onde los Pasteles</h1>
        <p>¡Sabor auténtico en Orotina!</p>
    </header>

    <main>
        <section id="menu-container">
            </section>

        <section id="carrito-seccion">
            <h2 class="neon-text-blue">Tu Pedido</h2>
            <div id="lista-carrito"></div>
            <div class="total-contenedor">
                <span>Total:</span>
                <span id="total-precio">₡0</span>
            </div>
            
            <div class="ubicacion-bloque">
                <button id="btn-geo" onclick="obtenerUbicacion()">
                    <i class="fas fa-map-marker-alt"></i> Compartir mi Ubicación
                </button>
                <p id="status-geo">Requerido para entregas a domicilio</p>
            </div>

            <button id="btn-enviar" onclick="enviarPedido()">
                <i class="fab fa-whatsapp"></i> Enviar Pedido por WhatsApp
            </button>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
