<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onde los Pasteles</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <main id="menu-container"></main>

    <section class="seccion-pedido">
        <div class="contenedor-blanco-borde">
            <h2>Tu Pedido</h2>
            
            <div id="lista-carrito">
                </div>

            <div class="fila-total">
                <span>Total:</span>
                <span id="total-precio">₡0</span>
            </div>

            <div class="tarjeta-ubicacion">
                <button id="btn-geo" onclick="obtenerUbicacion()" class="btn-blanco-geo">
                    <span style="color: #007bff; font-size: 1.2em;">📍</span> 
                    <span id="status-geo" style="color: #007bff;">Compartir mi Ubicación</span>
                </button>
                <p class="texto-requerido">Requerido para entregas a domicilio</p>
            </div>

            <button class="btn-enviar-wa" onclick="enviarPedido()">
                ✅ Enviar Pedido por WhatsApp
            </button>
        </div>
    </section>

    <script src="app.js"></script>
</body>
</html>
